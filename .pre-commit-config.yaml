default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: ^tests/fixtures/html/
      - id: trailing-whitespace
        exclude: ^tests/fixtures/html/
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: scripts/run_python_with_src.sh
        language: python
        additional_dependencies: &python_hook_dependencies
          - anthropic>=0.40.0
          - beautifulsoup4>=4.12.0
          - boto3>=1.36.0
          - feedparser>=6.0.10
          - google-api-python-client>=2.154.0
          - google-auth>=2.36.0
          - httpx>=0.27.0
          - huggingface_hub>=0.27.0
          - kaggle>=1.7.4.5
          - lxml>=5.0.0
          - mypy>=1.10.0
          - openpyxl>=3.1.5
          - playwright>=1.53.0
          - pyarrow>=18.0.0
          - pydantic>=2.5.0
          - pytest>=8.0.0
          - pytest-asyncio>=0.24.0
          - pytest-cov>=5.0.0
          - pytest-mock>=3.12.0
          - pyyaml>=6.0.1
          - respx>=0.21.0
          - typer>=0.12.0
          - types-beautifulsoup4>=4.12.0
          - types-pyyaml>=6.0.0
        args: ["-m", "mypy", "src/"]
        pass_filenames: false
        stages: [pre-commit]

      - id: smoke-tests
        name: smoke tests
        entry: scripts/run_python_with_src.sh
        language: python
        additional_dependencies: *python_hook_dependencies
        args: ["-m", "pytest", "-q", "--maxfail=1", "tests/smoke"]
        pass_filenames: false
        stages: [pre-commit]

      - id: unit-tests
        name: unit tests
        entry: scripts/run_python_with_src.sh
        language: python
        additional_dependencies: *python_hook_dependencies
        args: ["-m", "pytest", "-q", "tests/unit"]
        pass_filenames: false
        stages: [pre-push]

      - id: integration-tests
        name: integration tests
        entry: scripts/run_python_with_src.sh
        language: python
        additional_dependencies: *python_hook_dependencies
        args: ["-m", "pytest", "-q", "tests/integration"]
        pass_filenames: false
        stages: [pre-push]
