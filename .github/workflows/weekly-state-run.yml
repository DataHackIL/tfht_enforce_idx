name: weekly-state-run

on:
  # Weekly catch-up ingest for news_items, with manual dispatch for ad hoc reruns.
  schedule:
    # Runs at 04:30 UTC every Sunday, which is 06:30 in Israel Standard Time
    # (UTC+2) and 07:30 during Israel daylight saving time (UTC+3).
    - cron: "30 4 * * 0"
  workflow_dispatch:

concurrency:
  group: state-run
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEFAULT_PYTHON_VERSION: "3.11"
  STATE_REPO: DataHackIL/tfht_enforce_idx_state
  DATASET_NAME: news_items
  JOB_NAME: ingest
  JOB_CONFIG_PATH: agents/news/github.yaml
  STATE_JOB_DIR: state_repo/news_items/ingest

jobs:
  run-weekly-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: news-items-ingest

    steps:
      - name: Checkout code repo
        uses: actions/checkout@v6

      - name: Checkout state repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.STATE_REPO }}
          token: ${{ secrets.STATE_REPO_PAT }}
          path: state_repo

      - name: Set up denbust job
        uses: ./.github/actions/setup-denbust-state-job
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          install-playwright: "true"
          state-job-dir: ${{ env.STATE_JOB_DIR }}

      - name: Run weekly scan
        # Required secrets:
        # - ANTHROPIC_API_KEY
        # - DENBUST_SUPABASE_URL
        # - DENBUST_SUPABASE_SERVICE_ROLE_KEY
        # Optional if email output is enabled in config:
        # - DENBUST_EMAIL_SMTP_* / DENBUST_EMAIL_FROM / DENBUST_EMAIL_TO / DENBUST_EMAIL_SUBJECT
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DENBUST_SUPABASE_URL: ${{ secrets.DENBUST_SUPABASE_URL }}
          DENBUST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DENBUST_SUPABASE_SERVICE_ROLE_KEY }}
          DENBUST_EMAIL_SMTP_HOST: ${{ secrets.DENBUST_EMAIL_SMTP_HOST }}
          DENBUST_EMAIL_SMTP_PORT: ${{ secrets.DENBUST_EMAIL_SMTP_PORT }}
          DENBUST_EMAIL_SMTP_USERNAME: ${{ secrets.DENBUST_EMAIL_SMTP_USERNAME }}
          DENBUST_EMAIL_SMTP_PASSWORD: ${{ secrets.DENBUST_EMAIL_SMTP_PASSWORD }}
          DENBUST_EMAIL_FROM: ${{ secrets.DENBUST_EMAIL_FROM }}
          DENBUST_EMAIL_TO: ${{ secrets.DENBUST_EMAIL_TO }}
          DENBUST_EMAIL_USE_TLS: ${{ secrets.DENBUST_EMAIL_USE_TLS }}
          DENBUST_EMAIL_SUBJECT: ${{ secrets.DENBUST_EMAIL_SUBJECT }}
          DENBUST_STATE_ROOT: state_repo
        run: denbust scan --config ${{ env.JOB_CONFIG_PATH }}

      - name: Commit and push state changes
        if: ${{ always() }}
        run: |
          if [[ -z "$(git -C state_repo status --short)" ]]; then
            echo "No state changes to commit."
            exit 0
          fi

          git -C state_repo config user.name "github-actions[bot]"
          git -C state_repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -f "${{ env.STATE_JOB_DIR }}/seen.json" ]]; then
            git -C state_repo add -- "${{ env.DATASET_NAME }}/${{ env.JOB_NAME }}/seen.json"
          fi
          if [[ -d "${{ env.STATE_JOB_DIR }}/runs" ]]; then
            git -C state_repo add -- "${{ env.DATASET_NAME }}/${{ env.JOB_NAME }}/runs"
          fi
          if [[ -d "${{ env.STATE_JOB_DIR }}/logs" ]]; then
            git -C state_repo add -- "${{ env.DATASET_NAME }}/${{ env.JOB_NAME }}/logs"
          fi
          if [[ -d "${{ env.STATE_JOB_DIR }}/publication" ]]; then
            git -C state_repo add -- "${{ env.DATASET_NAME }}/${{ env.JOB_NAME }}/publication"
          fi

          if [[ -z "$(git -C state_repo status --short)" ]]; then
            echo "No staged state changes to commit."
            exit 0
          fi

          git -C state_repo commit -m "chore(state): update weekly seen store and run snapshot"
          git -C state_repo push
