name: weekly-state-run

on:
  schedule:
    # Runs at 04:30 UTC every Sunday, which is 06:30 in Israel Standard Time
    # (UTC+2) and 07:30 during Israel daylight saving time (UTC+3).
    - cron: "30 4 * * 0"
  workflow_dispatch:

concurrency:
  group: state-run
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEFAULT_PYTHON_VERSION: "3.11"
  STATE_REPO: DataHackIL/tfht_enforce_idx_state

jobs:
  run-weekly-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code repo
        uses: actions/checkout@v6

      - name: Checkout state repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.STATE_REPO }}
          token: ${{ secrets.STATE_REPO_PAT }}
          path: state_repo

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Ensure state repo structure exists
        run: mkdir -p state_repo/news_items/ingest/runs state_repo/news_items/ingest/publication

      - name: Run weekly scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DENBUST_EMAIL_SMTP_HOST: ${{ secrets.DENBUST_EMAIL_SMTP_HOST }}
          DENBUST_EMAIL_SMTP_PORT: ${{ secrets.DENBUST_EMAIL_SMTP_PORT }}
          DENBUST_EMAIL_SMTP_USERNAME: ${{ secrets.DENBUST_EMAIL_SMTP_USERNAME }}
          DENBUST_EMAIL_SMTP_PASSWORD: ${{ secrets.DENBUST_EMAIL_SMTP_PASSWORD }}
          DENBUST_EMAIL_FROM: ${{ secrets.DENBUST_EMAIL_FROM }}
          DENBUST_EMAIL_TO: ${{ secrets.DENBUST_EMAIL_TO }}
          DENBUST_EMAIL_USE_TLS: ${{ secrets.DENBUST_EMAIL_USE_TLS }}
          DENBUST_EMAIL_SUBJECT: ${{ secrets.DENBUST_EMAIL_SUBJECT }}
          DENBUST_STATE_ROOT: state_repo
        run: denbust scan --config agents/news/github.yaml

      - name: Commit and push state changes
        if: ${{ always() }}
        run: |
          if [[ -z "$(git -C state_repo status --short)" ]]; then
            echo "No state changes to commit."
            exit 0
          fi

          git -C state_repo config user.name "github-actions[bot]"
          git -C state_repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -f state_repo/news_items/ingest/seen.json ]]; then
            git -C state_repo add -- news_items/ingest/seen.json
          fi
          if [[ -d state_repo/news_items/ingest/runs ]]; then
            git -C state_repo add -- news_items/ingest/runs
          fi
          if [[ -d state_repo/news_items/ingest/publication ]]; then
            git -C state_repo add -- news_items/ingest/publication
          fi

          if [[ -z "$(git -C state_repo status --short)" ]]; then
            echo "No staged state changes to commit."
            exit 0
          fi

          git -C state_repo commit -m "chore(state): update weekly seen store and run snapshot"
          git -C state_repo push
