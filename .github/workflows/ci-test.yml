name: ci-test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  DEFAULT_PYTHON_VERSION: "3.11"

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run smoke tests
        run: pytest -q --maxfail=1 tests/smoke

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run Ruff lint
        run: ruff check .

      - name: Run mypy
        run: mypy src/

  unit-tests:
    needs: [smoke-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      COVERAGE_FILE: coverage-unit.dat

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q tests/unit --cov=denbust --cov-report=term-missing --cov-report=

      - name: Upload unit coverage data
        uses: actions/upload-artifact@v6
        with:
          name: coverage-unit-data
          path: coverage-unit.dat

  integration-tests:
    needs: [smoke-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      COVERAGE_FILE: coverage-integration.dat

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest -q tests/integration --cov=denbust --cov-report=term-missing --cov-report=

      - name: Upload integration coverage data
        uses: actions/upload-artifact@v6
        with:
          name: coverage-integration-data
          path: coverage-integration.dat

  coverage:
    needs: [lint, unit-tests, integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Download unit coverage data
        uses: actions/download-artifact@v5
        with:
          name: coverage-unit-data
          path: coverage-data/unit

      - name: Download integration coverage data
        uses: actions/download-artifact@v5
        with:
          name: coverage-integration-data
          path: coverage-data/integration

      - name: Combine and report coverage
        run: |
          python -m coverage combine coverage-data/unit/coverage-unit.dat coverage-data/integration/coverage-integration.dat
          python -m coverage report --show-missing
          python -m coverage xml -o coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml
