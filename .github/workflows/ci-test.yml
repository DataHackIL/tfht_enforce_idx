name: ci-test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  DEFAULT_PYTHON_VERSION: "3.11"

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run smoke tests
        run: pytest -q --maxfail=1 tests/smoke

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run Ruff lint
        run: ruff check .

      - name: Run mypy
        run: mypy src/

  unit-tests:
    needs: [smoke-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      COVERAGE_FILE: .coverage.unit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q tests/unit --cov --cov-report=

      - name: Upload unit coverage data
        uses: actions/upload-artifact@v6
        with:
          name: coverage-unit-data
          path: .coverage.unit
          include-hidden-files: true

  integration-tests:
    needs: [smoke-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      COVERAGE_FILE: .coverage.integration

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest -q tests/integration --cov --cov-report=

      - name: Upload integration coverage data
        uses: actions/upload-artifact@v6
        with:
          name: coverage-integration-data
          path: .coverage.integration
          include-hidden-files: true

  coverage:
    needs: [lint, unit-tests, integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Download unit coverage data
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit-data
          path: coverage-data/unit

      - name: Download integration coverage data
        uses: actions/download-artifact@v8
        with:
          name: coverage-integration-data
          path: coverage-data/integration

      - name: Combine and report coverage
        run: |
          python -m coverage combine coverage-data/unit/.coverage.unit coverage-data/integration/.coverage.integration
          python -m coverage report
          python -m coverage xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  pr-agent-context:
    name: PR agent context
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [lint, unit-tests, integration-tests, coverage]
    permissions:
      contents: read
      actions: read
      pull-requests: write
    uses: shaypal5/pr-agent-context/.github/workflows/pr-agent-context.yml@v4
    with:
      tool_ref: v4
      target_patch_coverage: "100"
      include_review_comments: true
      include_failing_checks: true
      include_patch_coverage: true
      patch_coverage_source_mode: coverage_xml_artifact
      coverage_report_artifact_name: coverage-xml
      coverage_report_filename: coverage.xml
      prompt_template_file: .github/pr-agent-context-template.md
      debug_artifacts: true
