# Release configuration for the news_items dataset
name: news-items-release
dataset_name: news_items
job_name: release

output:
  formats:
    - cli

store:
  state_root: data

operational:
  provider: supabase

release:
  schema_version: news_items-v1
  include_csv: true
  rights_policy_version: news_items-v1
  privacy_policy_version: news_items-v1
