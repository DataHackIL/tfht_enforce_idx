# Default local configuration for enforcement news monitoring
name: enforcement-news
dataset_name: news_items
job_name: ingest
days: 21
max_articles: 30

sources:
  - name: ynet
    type: rss
    url: https://www.ynet.co.il/Integration/StoryRss2.xml
    enabled: true

  - name: walla
    type: scraper
    enabled: true

  - name: mako
    type: scraper
    enabled: true

  - name: maariv
    type: scraper
    enabled: true

  - name: haaretz
    type: scraper
    enabled: true

  - name: ice
    type: scraper
    enabled: true

keywords:
  - זנות
  - בית בושת
  - סרסור
  - סחר בבני אדם
  - צו סגירה
  - ליווי
  - נערות ליווי
  - תעשיית המין
  - עיסוי חשוד
  - זירת זנות

classifier:
  provider: anthropic
  model: claude-sonnet-4-20250514

dedup:
  similarity_threshold: 0.7

output:
  formats:
    - cli

store:
  state_root: data

operational:
  provider: local_json
