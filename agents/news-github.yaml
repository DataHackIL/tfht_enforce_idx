# GitHub Actions configuration for enforcement news monitoring
name: enforcement-news-github
days: 21
max_articles: 30

sources:
  - name: ynet
    type: rss
    url: https://www.ynet.co.il/Integration/StoryRss2.xml
    enabled: true

  # Scraped sources - archive/search scraping with keyword/date filtering
  - name: walla
    type: scraper
    enabled: true

  - name: mako
    type: scraper
    enabled: true

  - name: maariv
    type: scraper
    enabled: true

  - name: haaretz
    type: scraper
    enabled: true

  - name: ice
    type: scraper
    enabled: true

keywords:
  - זנות
  - בית בושת
  - סרסור
  - סחר בבני אדם
  - צו סגירה
  - ליווי
  - נערות ליווי
  - תעשיית המין
  - עיסוי חשוד
  - זירת זנות

classifier:
  provider: anthropic
  model: claude-sonnet-4-20250514

dedup:
  similarity_threshold: 0.7

output:
  formats:
    - cli
    - email

store:
  seen_path: data/seen.json
  runs_dir: data/runs
